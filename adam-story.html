// ─── TTS ─────────────────────────────────────────────────────────────────────
function useTTS() {
  const [speaking, setSpeaking] = React.useState(false);
  const [paused, setPaused] = React.useState(false);

  const stop = React.useCallback(() => {
    window.speechSynthesis.cancel();
    setSpeaking(false); setPaused(false);
  }, []);

  const speak = React.useCallback((text) => {
    stop();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = "ru-RU"; utt.rate = 0.9; utt.pitch = 1.0;
    const voices = window.speechSynthesis.getVoices();
    const ru = voices.find(v => v.lang.startsWith("ru") && v.localService) || voices.find(v => v.lang.startsWith("ru"));
    if (ru) utt.voice = ru;
    utt.onstart = () => { setSpeaking(true); setPaused(false); };
    utt.onend = () => { setSpeaking(false); setPaused(false); };
    utt.onerror = () => { setSpeaking(false); setPaused(false); };
    window.speechSynthesis.speak(utt);
  }, [stop]);

  const togglePause = React.useCallback(() => {
    if (paused) { window.speechSynthesis.resume(); setPaused(false); }
    else { window.speechSynthesis.pause(); setPaused(true); }
  }, [paused]);

  React.useEffect(() => () => stop(), [stop]);
  return { speaking, paused, speak, stop, togglePause };
}

                    else if (i === chosen) cls += " wrong";
                    else cls += " dim";
                  }
                  return (
                    <button key={i} className={cls} onClick={() => handleAnswer(i)} disabled={chosen !== null}>
                      <span className="opt-letter">{LETTERS[i]}</span>
                      {opt}
                    </button>
                  );
                })}
              </div>
              {chosen !== null && (
                <div className="exp-card">
                  <div className="exp-header">
                    <div className={`exp-icon ${chosen === question.correct ? "exp-icon-ok" : "exp-icon-err"}`}>
                      {chosen === question.correct ? "✓" : "✗"}
                    </div>
                    <div className={`exp-result ${chosen === question.correct ? "exp-ok" : "exp-err"}`}>
                      {chosen === question.correct ? "Правильно!" : "Неверно — запомни"}
                    </div>
                  </div>
                  <div className="exp-text">{question.explanation}</div>
                  {question.ayah && (
                    <div className="ayah-block">
                      <div className="ayah-arabic">{question.ayah}</div>
                      <div className="ayah-ref">— {question.ayah_ref}</div>
                    </div>
                  )}
                </div>
              )}
              {chosen !== null && (
                <button className="next-btn" onClick={handleNext}>
                  {qIdx + 1 < part.questions.length ? "Следующий вопрос →"
                    : partIdx + 1 < STORY_PARTS.length ? `Часть ${partIdx + 2}: ${STORY_PARTS[partIdx + 1].title} →`
                    : "Посмотреть результат →"}
                </button>
              )}
            </div>
          </>
        )}

        {screen === "result" && (
          <div className="result-wrap">
            <div className="result-circle">{emoji}</div>
            <div className="result-title">История пройдена!</div>
            <div className="result-score">{score} <small>/ {totalQ}</small></div>
            <div className="result-msg">{msg}</div>
            <div className="hadith-card">
              <div className="hadith-arabic">طَلَبُ الْعِلْمِ فَرِيضَةٌ عَلَى كُلِّ مُسْلِمٍ</div>
              <div className="hadith-trans">«Стремление к знаниям — обязанность каждого мусульманина» (Ибн Маджа)</div>
            </div>
            <div className="result-btns">
              <button className="btn-green" onClick={restart}>🔄 Пройти ещё раз</button>
              <button className="btn-outline" onClick={restart}>📋 К содержанию</button>
            </div>
          </div>
        )}

      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
