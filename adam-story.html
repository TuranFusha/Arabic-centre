// ─── TTS ─────────────────────────────────────────────────────────────────────
function useTTS() {
  const [active, setActive] = useState(false);
  const [paused, setPaused] = useState(false);

  const stop = useCallback(() => {
    window.speechSynthesis.cancel();
    setActive(false); setPaused(false);
  }, []);

  const speak = useCallback((text) => {
    stop();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ru-RU"; u.rate = 0.9;
    const voices = window.speechSynthesis.getVoices();
    const ru = voices.find(v => v.lang.startsWith("ru") && v.localService) || voices.find(v => v.lang.startsWith("ru"));
    if (ru) u.voice = ru;
    u.onstart = () => { setActive(true); setPaused(false); };
    u.onend = u.onerror = () => { setActive(false); setPaused(false); };
    window.speechSynthesis.speak(u);
  }, [stop]);

  const toggle = useCallback(() => {
    if (paused) { window.speechSynthesis.resume(); setPaused(false); }
    else { window.speechSynthesis.pause(); setPaused(true); }
  }, [paused]);

  useEffect(() => () => stop(), [stop]);
  return { active, paused, speak, stop, toggle };
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("home");
  const [pIdx, setPIdx] = useState(0);
  const [qIdx, setQIdx] = useState(0);
  const [chosen, setChosen] = useState(null);
  const [score, setScore] = useState(0);
  const [totalQ, setTotalQ] = useState(0);
  const [done, setDone] = useState([]);
  const { active, paused, speak, stop, toggle } = useTTS();

  const part = PARTS[pIdx];
  const q = part?.questions[qIdx];
  const totalQs = PARTS.reduce((s, p) => s + p.questions.length, 0);
  const pct = screen === "result" ? 100 : (pIdx / PARTS.length) * 100;

  const goStory = (i) => { setPIdx(i); setQIdx(0); setChosen(null); stop(); setScreen("story"); };
  const goQuestion = () => { stop(); setChosen(null); setQIdx(0); setScreen("question"); };

  const answer = (i) => {
    if (chosen !== null) return;
    setChosen(i);
    if (i === q.correct) setScore(s => s + 1);
    setTotalQ(s => s + 1);
  };

  const next = () => {
    const nq = qIdx + 1;
    if (nq < part.questions.length) { setQIdx(nq); setChosen(null); }
    else {
      setDone(d => [...d, pIdx]);
      const np = pIdx + 1;
      if (np < PARTS.length) { setPIdx(np); setQIdx(0); setChosen(null); setScreen("story"); }
      else setScreen("result");
    }
  };

  const restart = () => { setScreen("home"); setPIdx(0); setQIdx(0); setChosen(null); setScore(0); setTotalQ(0); setDone([]); stop(); };

  const msg = score >= totalQs * 0.9 ? "Машааллах. Вы глубоко усвоили историю Адама (мир ему)."
    : score >= totalQs * 0.7 ? "Хороший результат. Продолжайте изучать — знания укрепляют веру."
    : "Пройдите ещё раз. Знания о пророках — это нур (свет) для сердца.";

  return (
    <>
      <style>{css}</style>
      <div className="app">

        {/* NAV */}
        {screen !== "home" && screen !== "result" && (
          <div className="nav">
            <button className="nav-back" onClick={() => screen === "question" ? (stop(), setScreen("story"), setChosen(null)) : restart()}>
              <IcBack /> {screen === "story" ? "Главная" : "К тексту"}
            </button>
            <div className="nav-center">
              <div className="nav-title">{part.title}</div>
              {screen === "question" && <div className="nav-sub">Вопрос {qIdx + 1} из {part.questions.length}</div>}
            </div>
            <div className="nav-count">{pIdx + 1} / {PARTS.length}</div>
          </div>
        )}

        {screen !== "home" && (
          <div className="progress"><div className="progress-bar" style={{width: pct + "%"}} /></div>
        )}

        {/* HOME */}
        {screen === "home" && (
          <div className="wrap">
            <div className="home-header">
              <div className="home-label">Пророк № 1</div>
              <div className="home-ar">آدَمُ عَلَيْهِ السَّلَامُ</div>
              <div className="home-title-text">Адам (мир ему)</div>
              <div className="home-desc">История его сотворения, испытания в Раю, отказ Иблиса и урок покаяния — на основе Корана и достоверных источников.</div>
            </div>

            <div className="home-stats">
              <div className="hs"><div className="hs-n">{PARTS.length}</div><div className="hs-l">частей</div></div>
              <div className="hs"><div className="hs-n">{totalQs}</div><div className="hs-l">вопросов</div></div>
              <div className="hs"><div className="hs-n">15</div><div className="hs-l">минут</div></div>
            </div>

            <div className="sec-lbl">Содержание</div>
            <div className="parts-list">
              {PARTS.map((p, i) => (
                <div key={i} className="part-row" onClick={() => goStory(i)}>
                  <div className="pr-num">{p.id}</div>
                  <div className="pr-body">
                    <div className="pr-title">{p.title}</div>
                    <div className="pr-sub">{p.subtitle}</div>
                  </div>
                  {done.includes(i)
                    ? <div className="pr-done"><IcCheck /></div>
                    : <div className="pr-chev"><IcChev /></div>}
                </div>
              ))}
            </div>
            <button className="start-all" onClick={() => goStory(0)}>Начать с начала</button>
          </div>
        )}

        {/* STORY */}
        {screen === "story" && part && (
          <div className="wrap">
            <div className="audio-bar">
              {!active
                ? <button className="audio-btn" onClick={() => speak(part.text)}><IcPlay /></button>
                : <>
                    <button className="audio-btn" onClick={toggle}>{paused ? <IcPlay /> : <IcPause />}</button>
                    <button className="audio-btn stop-btn" onClick={stop}><IcStop /></button>
                  </>
              }
              <div className="audio-info">
                <div className="audio-label">{active && !paused ? "Озвучка идёт" : paused ? "Пауза" : "Прослушать"}</div>
                <div className="audio-sub">{active ? "Нажмите для паузы" : "Нажмите ▶ чтобы начать"}</div>
              </div>
              {active && !paused && (
                <div className="audio-bars">
                  <span /><span /><span /><span />
                </div>
              )}
            </div>

            <div className="story-block">
              <div className="story-eyebrow">Часть {part.id} · {part.title}</div>
              <div className="story-text">{part.text}</div>
            </div>

            <button className="btn-primary" onClick={goQuestion}>Перейти к вопросам</button>
          </div>
        )}

        {/* QUESTION */}
        {screen === "question" && part && q && (
          <div className="wrap">
            <div className="q-block">
              <div className="q-eyebrow">Вопрос {qIdx + 1} из {part.questions.length}</div>
              <div className="q-text">{q.q}</div>
            </div>

            <div className="opts">
              {q.options.map((opt, i) => {
                let cls = "opt";
                if (chosen !== null) {
                  if (i === q.correct) cls += " correct";
                  else if (i === chosen) cls += " wrong";
                  else cls += " dim";
                }
                return (
                  <button key={i} className={cls} onClick={() => answer(i)} disabled={chosen !== null}>
                    <span className="opt-badge">{LETTERS[i]}</span>
                    {opt}
                  </button>
                );
              })}
            </div>

            {chosen !== null && (
              <div className="exp">
                <div className={`exp-status ${chosen === q.correct ? "ok" : "err"}`}>
                  {chosen === q.correct ? "Правильно" : "Неверно — запомни"}
                </div>
                <div className="exp-text">{q.explanation}</div>
                {q.ayah && (
                  <div className="exp-ayah">
                    <div className="ayah-ar">{q.ayah}</div>
                    <div className="ayah-ref">{q.ref}</div>
                  </div>
                )}
              </div>
            )}

            {chosen !== null && (
              <button className="btn-primary" onClick={next}>
                {qIdx + 1 < part.questions.length ? "Следующий вопрос"
                  : pIdx + 1 < PARTS.length ? `Часть ${pIdx + 2}: ${PARTS[pIdx + 1].title}`
                  : "Посмотреть результат"}
              </button>
            )}
          </div>
        )}

        {/* RESULT */}
        {screen === "result" && (
          <div className="result">
            <div className="result-score-label">Результат</div>
            <div className="result-score">
              {score}<span className="result-denom"> / {totalQ}</span>
            </div>
            <div className="result-msg">{msg}</div>

            <div className="result-hadith">
              <div className="rh-ar">طَلَبُ الْعِلْمِ فَرِيضَةٌ عَلَى كُلِّ مُسْلِمٍ</div>
              <div className="rh-tr">«Стремление к знаниям — обязанность каждого мусульманина»</div>
              <div className="rh-ref">Ибн Маджа</div>
            </div>

            <div className="result-btns">
              <button className="btn-primary" onClick={() => goStory(0)}>Пройти ещё раз</button>
              <button className="btn-outline" onClick={restart}>К содержанию</button>
              <a href="index.html" style={{display:"block",width:"100%",background:"none",border:"none",textAlign:"center",color:"var(--label-2)",fontSize:"15px",padding:"8px",cursor:"pointer",textDecoration:"none"}}>
                На главную
              </a>
            </div>
          </div>
        )}

      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
