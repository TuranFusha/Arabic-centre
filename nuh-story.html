Четвёртый урок: гордыня закрывает сердца. Народ Нуха не принял истину не потому, что у них не было доводов — а потому что их гордыня не позволяла признать правду. Высокомерие — главный враг истины.

Пятый урок: вера важнее родства. Сын Нуха погиб, несмотря на то что его отец — пророк. Вера — это личный выбор каждого. Никто не войдёт в рай «по наследству».

Шестой урок: поминай Аллаха при каждом движении. «С именем Аллаха он будет плыть и останавливаться» — это сунна, данная нам с первого корабля в истории человечества.`,

const LETTERS = ["A", "B", "C", "D"];

function useTTS() {
  const [active, setActive] = React.useState(false);
  const [paused, setPaused] = React.useState(false);

  const stop = React.useCallback(() => {
    window.speechSynthesis.cancel();
    setActive(false); setPaused(false);
  }, []);

  const speak = React.useCallback((text) => {
    stop();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ru-RU"; u.rate = 0.9;
    const voices = window.speechSynthesis.getVoices();
    const ru = voices.find(v => v.lang.startsWith("ru") && v.localService) || voices.find(v => v.lang.startsWith("ru"));
    if (ru) u.voice = ru;
    u.onstart = () => { setActive(true); setPaused(false); };
    u.onend = u.onerror = () => { setActive(false); setPaused(false); };
    window.speechSynthesis.speak(u);
  }, [stop]);

  const toggle = React.useCallback(() => {
    if (paused) { window.speechSynthesis.resume(); setPaused(false); }
    else { window.speechSynthesis.pause(); setPaused(true); }
  }, [paused]);

  React.useEffect(() => () => stop(), [stop]);
  return { active, paused, speak, stop, toggle };
}

  const goQuestion = () => { stop(); setChosen(null); setQIdx(0); setScreen("question"); };

    setChosen(i);
    if (i === q.correct) setScore(s => s + 1);
    setTotalQ(s => s + 1);

    if (nq < part.questions.length) { setQIdx(nq); setChosen(null); }

      setDone(d => [...d, pIdx]);
      const np = pIdx + 1;
      if (np < PARTS.length) { setPIdx(np); setQIdx(0); setChosen(null); setScreen("story"); }
      else setScreen("result");
    }
  };

  const restart = () => { setScreen("home"); setPIdx(0); setQIdx(0); setChosen(null); setScore(0); setTotalQ(0); setDone([]); stop(); };

        {/* RESULT */}
        {screen === "result" && (
          <div className="result">
            <div className="result-score-label">Результат</div>
            <div className="result-score">{score}<span className="result-denom"> / {totalQ}</span></div>
            <div className="result-msg">{msg}</div>
            <div className="result-hadith">
              <div className="rh-ar">إِنَّ نُوحًا كَانَ عَبْدًا شَكُورًا</div>
              <div className="rh-tr">«Воистину, Нух был благодарным рабом»</div>
              <div className="rh-ref">Аль-Исра, 17:3</div>
            </div>
            <div className="result-btns">
              <button className="btn-primary" onClick={() => goStory(0)}>Пройти ещё раз</button>
              <button className="btn-outline" onClick={restart}>К содержанию</button>
              <a href="index.html" style={{display:"block",width:"100%",textAlign:"center",color:"var(--label-2)",fontSize:"15px",padding:"8px",textDecoration:"none"}}>
                На главную
              </a>
            </div>
          </div>
        )}

      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
